global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'characterverse'
    env: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'characterverse-api'
    static_configs:
      - targets: ['api:4000']
    metrics_path: '/health/metrics'
    scrape_interval: 15s
    honor_labels: true

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
